<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clickme</title>
<style>
  body {
    background-color: #fff; /* changed from #000 to #fff */
    color: #000; /* changed from #fff to #000 */
    font-family: Arial, sans-serif;
  }
  .container {
    text-align: center;
    padding: 20px;
  }
  .logo-link {
    display: inline-block;
    margin-bottom: 20px;
  }
  .logo-link img {
    width: 570px; /* adjust the size as needed */
    height: auto;
  }
  .button-link {
    display: inline-block;
    padding: 10px 20px;
    background-color: #fff; /* changed from #000 to #fff */
    color: #000; /* changed from #fff to #000 */
    text-decoration: none;
    border: 1px solid #000; /* changed from #fff to #000 */
    border-radius: 5px;
    transition: background-color 0.3s, border-color 0.3s;
  }
  .button-link:hover {
    background-color: #000; /* changed from #fff to #000 */
    color: #fff; /* changed from #000 to #fff */
  }
</style>
</head>
<body>

<div class="container">
  <a class="logo-link" href="https://example.com">
    <img src="HUSTLERLOOGO4.png" alt="Logo">
  </a>
  <br>
  <a class="button-link" href="index.html">Click Me</a>
</div>

</body>
</html>
